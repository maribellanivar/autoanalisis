
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bur: #6B2737; --bur-l: #8B3A4A; --bur-p: #F5EAEC;
    --earth: #8B7355; --earth-l: #C4A882;
    --cream: #FAF7F2; --ink: #2C1810; --muted: #7A6A5A;
    --line: rgba(107,39,55,0.15);
  }
  body { font-family: 'Jost', sans-serif; -webkit-text-size-adjust: 100%; }
  .planner { background: var(--cream); padding: 1.25rem 1rem 4rem; color: var(--ink); max-width: 480px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 1.75rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--line); }
  .eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--earth); font-weight: 500; margin-bottom: 0.5rem; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--bur); line-height: 1.2; margin-bottom: 0.4rem; }
  .subtitle { font-size: 12px; color: var(--muted); font-weight: 300; letter-spacing: 0.05em; }
  .user-bar { background: var(--bur-p); border: 1px solid var(--line); border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; }
  .user-bar-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--bur); font-weight: 500; margin-bottom: 6px; }
  .user-bar-row { display: flex; gap: 8px; align-items: center; }
  .user-bar-row input { flex: 1; background: white; border: 1px solid var(--line); border-radius: 6px; padding: 0.5rem 0.75rem; font-family: 'Jost', sans-serif; font-size: 14px; color: var(--ink); outline: none; }
  .user-bar-row input:focus { border-color: var(--bur-l); }
  .user-bar-btn { background: var(--bur); color: white; border: none; border-radius: 6px; padding: 0.5rem 0.9rem; font-size: 13px; font-family: 'Jost', sans-serif; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .user-bar-btn:active { opacity: 0.85; }
  .user-tag { font-size: 12px; color: var(--bur); margin-top: 6px; display: none; }
  .month-bar { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid var(--line); border-radius: 8px; padding: 0.65rem 1rem; margin-bottom: 1.25rem; }
  .month-bar label { font-size: 10px; color: var(--bur); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .month-bar input { flex: 1; background: transparent; border: none; outline: none; font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--ink); font-weight: 500; min-width: 0; }
  .prog-wrap { background: var(--line); border-radius: 4px; height: 3px; margin-bottom: 0.4rem; overflow: hidden; }
  .prog-bar { background: var(--bur); height: 100%; border-radius: 4px; transition: width 0.4s; width: 0%; }
  .prog-label { font-size: 10px; color: var(--muted); text-align: right; margin-bottom: 1rem; }
  .expand-btn { display: block; width: 100%; background: transparent; border: 1px solid var(--line); border-radius: 6px; padding: 0.55rem; font-family: 'Jost', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; letter-spacing: 0.05em; margin-bottom: 1.25rem; }
  .expand-btn:active { background: var(--bur-p); color: var(--bur); }
  .section { margin-bottom: 1.25rem; background: white; border-radius: 10px; border: 1px solid var(--line); overflow: hidden; }
  .sec-header { display: flex; align-items: center; gap: 10px; padding: 0.9rem 1rem; background: var(--bur-p); border-bottom: 1px solid var(--line); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .sec-num { width: 26px; height: 26px; background: var(--bur); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
  .sec-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--bur); flex: 1; line-height: 1.3; }
  .sec-icon { font-size: 16px; color: var(--earth-l); flex-shrink: 0; }
  .chevron { color: var(--bur); font-size: 13px; transition: transform 0.25s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }
  .sec-body { padding: 1rem; display: none; }
  .sec-body.open { display: block; }
  .quote-block { background: var(--bur-p); border-left: 3px solid var(--bur); padding: 0.6rem 0.8rem; margin-bottom: 1rem; border-radius: 0 6px 6px 0; }
  .quote-block p { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-style: italic; color: var(--bur); line-height: 1.5; }
  .field-group { margin-bottom: 0.9rem; }
  .field-label { display: block; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  textarea { width: 100%; background: var(--cream); border: 1px solid var(--line); border-radius: 6px; padding: 0.55rem 0.75rem; font-family: 'Jost', sans-serif; font-size: 15px; color: var(--ink); resize: vertical; outline: none; min-height: 72px; line-height: 1.6; -webkit-appearance: none; }
  textarea:focus { border-color: var(--bur-l); background: white; }
  input[type="text"].field-input { width: 100%; background: var(--cream); border: 1px solid var(--line); border-radius: 6px; padding: 0.55rem 0.75rem; font-family: 'Jost', sans-serif; font-size: 15px; color: var(--ink); outline: none; -webkit-appearance: none; }
  input[type="text"].field-input:focus { border-color: var(--bur-l); background: white; }
  .main-focus { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--bur); text-align: center; border: none; border-bottom: 2px solid var(--bur); border-radius: 0; background: transparent; padding: 0.5rem 0.5rem; width: 100%; outline: none; }
  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .cb-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--cream); border-radius: 6px; border: 1px solid transparent; }
  .cb-item:has(input:checked) { border-color: var(--earth-l); background: #FAF5EF; }
  .cb-item input[type="checkbox"] { width: 18px; height: 18px; margin-top: 1px; accent-color: var(--bur); flex-shrink: 0; cursor: pointer; }
  .cb-item label { font-size: 14px; color: var(--ink); line-height: 1.5; cursor: pointer; flex: 1; }
  .cb-item:has(input:checked) label { color: var(--earth); }
  .sched-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.9rem; }
  .daily-list { display: flex; flex-direction: column; gap: 8px; }
  .task-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--cream); border-radius: 6px; border: 1px solid var(--line); }
  .task-badge { font-size: 9px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .badge-m { background: var(--bur); color: white; }
  .badge-s { background: var(--earth-l); color: white; }
  .task-row input { border: none; background: transparent; padding: 0; font-size: 14px; font-family: 'Jost', sans-serif; color: var(--ink); outline: none; flex: 1; min-width: 0; }
  .eval-week { margin-bottom: 0.9rem; padding: 0.9rem; background: var(--cream); border-radius: 8px; border: 1px solid var(--line); }
  .eval-week h4 { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--bur); margin-bottom: 0.65rem; font-weight: 600; }
  .star-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .star-row label { font-size: 11px; color: var(--muted); width: 65px; flex-shrink: 0; }
  .stars { display: flex; gap: 5px; }
  .star { width: 26px; height: 26px; cursor: pointer; color: #D3C4B0; font-size: 20px; transition: color 0.1s; -webkit-tap-highlight-color: transparent; }
  .star.filled { color: var(--bur); }
  .identity-list { display: flex; flex-direction: column; gap: 10px; }
  .id-item { display: flex; align-items: center; gap: 10px; }
  .id-dot { width: 6px; height: 6px; background: var(--bur); border-radius: 50%; flex-shrink: 0; }
  .closing { background: var(--bur); border-radius: 10px; padding: 1.5rem 1.25rem; text-align: center; margin-top: 2rem; }
  .closing p { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: white; line-height: 1.7; margin-bottom: 1rem; }
  .save-btn { background: white; color: var(--bur); border: none; border-radius: 6px; padding: 0.65rem 1.5rem; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; }
  .save-btn:active { opacity: 0.85; }
  .save-status { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 8px; height: 16px; }
  .lock-overlay { position: absolute; inset: 0; background: rgba(250,247,242,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border-radius: 10px; padding: 2rem; text-align: center; z-index: 10; }
  .lock-overlay p { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--bur); line-height: 1.5; }
  .lock-overlay small { font-size: 12px; color: var(--muted); }
  .section { position: relative; }
</style>

<div class="planner">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Planificador mensual disciplina cristiana</h2>

  <div class="header">
    <p class="eyebrow">Planificador mensual</p>
    <h1>Mi Vida Bajo Enfoque</h1>
    <p class="subtitle">Disciplina · Propósito · Obediencia</p>
  </div>

  <div class="user-bar">
    <div class="user-bar-label">Tu espacio personal</div>
    <div class="user-bar-row">
      <input type="text" id="user-input" placeholder="Escribe tu nombre para entrar..." />
      <button class="user-bar-btn" id="user-btn">Entrar</button>
    </div>
    <p class="user-tag" id="user-tag"></p>
  </div>

  <div id="main-content" style="display:none;">
    <div class="month-bar">
      <label>Mes</label>
      <input type="text" id="mes-input" placeholder="Escribe el mes y año..." />
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    <p class="prog-label" id="prog-label">0 de 10 secciones abiertas</p>
    <button class="expand-btn" id="expand-btn">Expandir todas las secciones</button>
    <div id="sections-container"></div>
    <div class="closing">
      <p>"Este mes no voy a hacer más… voy a hacer lo correcto."</p>
      <p style="font-size:15px;margin-bottom:1.25rem;">"No voy a seguir dispersa… voy a vivir enfocada."</p>
      <button class="save-btn" id="main-save">Guardar mi planificador</button>
      <p class="save-status" id="save-status"></p>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  { id:'s1', num:1, icon:'ti-cross', title:'Claridad espiritual — Alineación', quote:'"No planifiques tu mes sin dirección… o solo estarás ocupada, no alineada."',
    fields:[{type:'ta',id:'q1a',label:'¿Qué siento que Dios me está pidiendo en esta temporada?',rows:3},{type:'ta',id:'q1b',label:'¿En qué área específica necesito obedecer?',rows:3},{type:'ta',id:'q1c',label:'¿Qué he estado evitando que sé que debo hacer?',rows:3}]},
  { id:'s2', num:2, icon:'ti-target', title:'Mi prioridad del mes — Solo una', quote:'"Si no cabe aquí… no cabe en tu agenda."',
    fields:[{type:'focus',id:'q2a',label:'Mi enfoque principal este mes es'},{type:'ta',id:'q2b',label:'¿Por qué esto es importante?',rows:2},{type:'ta',id:'q2c',label:'¿Qué pasa si NO lo hago?',rows:2}]},
  { id:'s3', num:3, icon:'ti-ban', title:'Lo que voy a eliminar', quote:'"No hay enfoque sin renuncia."',
    fields:[{type:'ta',id:'q3a',label:'Cosas que voy a pausar',rows:2},{type:'ta',id:'q3b',label:'Distracciones que voy a cortar',rows:2},{type:'ta',id:'q3c',label:'Compromisos que voy a cancelar o reducir',rows:2}]},
  { id:'s4', num:4, icon:'ti-shield', title:'Mis límites — Aprender a decir no',
    fields:[{type:'ta',id:'q4a',label:'No voy a decir sí a',rows:2},{type:'ta',id:'q4b',label:'Voy a proteger mi tiempo de',rows:2},{type:'ta',id:'q4c',label:'Cuando alguien me pida algo, responderé',rows:2,ph:'"Ahora mismo estoy enfocada en algo importante"'}]},
  { id:'s5', num:5, icon:'ti-clock', title:'Bloques de enfoque semanales', quote:'"Lo que no se agenda… no se hace."',
    fields:[{type:'sched',id:'q5'}]},
  { id:'s6', num:6, icon:'ti-list-check', title:'Mi sistema diario simple', quote:'"Si hago lo principal… gané el día."',
    fields:[{type:'daily',id:'q6'}]},
  { id:'s7', num:7, icon:'ti-lock', title:'Reglas de disciplina personal',
    fields:[{type:'checks',id:'q7',items:[{id:'cb1',label:'No redes sociales antes de mi bloque de enfoque'},{id:'cb2',label:'No multitasking mientras trabajo en mi prioridad'},{id:'cb3',label:'No negociar con lo que ya decidí'}]},{type:'ta',id:'q7x',label:'Mi regla personal (agrega la tuya)',rows:2}]},
  { id:'s8', num:8, icon:'ti-alert-triangle', title:'Posibles sabotajes — Anticípate', quote:'"La disciplinada no evita la batalla… se prepara para ella."',
    fields:[{type:'ta',id:'q8a',label:'¿Qué me va a distraer este mes?',rows:2},{type:'ta',id:'q8b',label:'¿Qué excusas suelo usar?',rows:2},{type:'ta',id:'q8c',label:'¿Qué voy a hacer cuando no tenga ganas?',rows:2}]},
  { id:'s9', num:9, icon:'ti-refresh', title:'Evaluación semanal', fields:[{type:'eval',id:'q9'}]},
  { id:'s10', num:10, icon:'ti-crown', title:'Mi identidad — Lo más importante', fields:[{type:'identity',id:'q10'}]},
];

let currentUser = null;

function userKey(field) { return 'plan__' + currentUser + '__' + field; }

function buildSection(s) {
  const div = document.createElement('div');
  div.className = 'section'; div.id = 'sec-' + s.id;

  const hdr = document.createElement('div');
  hdr.className = 'sec-header';
  hdr.innerHTML = `<div class="sec-num">${s.num}</div><span class="sec-title">${s.title}</span><i class="ti ${s.icon} sec-icon" aria-hidden="true"></i><i class="ti ti-chevron-down chevron" aria-hidden="true"></i>`;

  const body = document.createElement('div');
  body.className = 'sec-body'; body.id = 'body-' + s.id;

  if (s.quote) { body.innerHTML = `<div class="quote-block"><p>${s.quote}</p></div>`; }

  s.fields.forEach(f => {
    if (f.type === 'ta') {
      const g = document.createElement('div'); g.className = 'field-group';
      g.innerHTML = `<label class="field-label" for="${f.id}">${f.label}</label><textarea id="${f.id}" rows="${f.rows||3}" placeholder="${f.ph||''}"></textarea>`;
      body.appendChild(g);
    } else if (f.type === 'focus') {
      const g = document.createElement('div'); g.className = 'field-group'; g.style.textAlign = 'center';
      g.innerHTML = `<label class="field-label" for="${f.id}" style="text-align:center;display:block;">${f.label}</label><input type="text" id="${f.id}" class="main-focus" placeholder="__________" />`;
      body.appendChild(g);
    } else if (f.type === 'checks') {
      const g = document.createElement('div'); g.className = 'field-group';
      let h = '<div class="checkbox-group">';
      f.items.forEach(it => { h += `<div class="cb-item"><input type="checkbox" id="${it.id}" /><label for="${it.id}">${it.label}</label></div>`; });
      g.innerHTML = h + '</div>'; body.appendChild(g);
    } else if (f.type === 'sched') {
      const g = document.createElement('div'); g.className = 'field-group';
      g.innerHTML = `<div class="sched-grid"><div><label class="field-label">Días a la semana</label><input type="text" id="q5d" class="field-input" placeholder="Ej: Lunes a viernes" /></div><div><label class="field-label">Horario específico</label><input type="text" id="q5h" class="field-input" placeholder="Ej: 7:00am – 8:30am" /></div></div>`;
      body.appendChild(g);
    } else if (f.type === 'daily') {
      const g = document.createElement('div'); g.className = 'field-group';
      g.innerHTML = `<label class="field-label">Mis tareas del día</label><div class="daily-list"><div class="task-row"><span class="task-badge badge-m">Principal</span><input id="tm" placeholder="La tarea más importante..." /></div><div class="task-row"><span class="task-badge badge-s">Secundaria 1</span><input id="ts1" placeholder="" /></div><div class="task-row"><span class="task-badge badge-s">Secundaria 2</span><input id="ts2" placeholder="" /></div></div>`;
      body.appendChild(g);
    } else if (f.type === 'eval') {
      const g = document.createElement('div'); g.className = 'field-group';
      ['Semana 1','Semana 2','Semana 3','Semana 4'].forEach((sem, wi) => {
        const w = document.createElement('div'); w.className = 'eval-week';
        w.innerHTML = `<h4>${sem}</h4><div class="star-row"><label>Enfoque</label><div class="stars" id="st${wi}">${[1,2,3,4,5].map(n=>`<span class="star ti ti-star" data-w="${wi}" data-v="${n}" role="button" tabindex="0" aria-label="Estrella ${n}"></span>`).join('')}</div></div><div class="field-group"><label class="field-label">¿Dónde fallé?</label><textarea id="ef${wi}" rows="2"></textarea></div><div class="field-group" style="margin:0"><label class="field-label">¿Qué debo ajustar?</label><textarea id="ea${wi}" rows="2"></textarea></div>`;
        g.appendChild(w);
      });
      body.appendChild(g);
    } else if (f.type === 'identity') {
      const g = document.createElement('div'); g.className = 'field-group';
      g.innerHTML = `<label class="field-label" style="margin-bottom:10px">Este mes decido ser una mujer que...</label><div class="identity-list">${[1,2,3].map(i=>`<div class="id-item"><div class="id-dot"></div><input type="text" id="id${i}" class="field-input" placeholder="Ej: ejecuta, se gobierna, no negocia..." /></div>`).join('')}</div>`;
      body.appendChild(g);
    }
  });

  hdr.addEventListener('click', () => {
    const open = body.classList.toggle('open');
    hdr.querySelector('.chevron').classList.toggle('open', open);
    updateProg();
  });

  div.appendChild(hdr); div.appendChild(body);
  return div;
}

function updateProg() {
  const open = document.querySelectorAll('.sec-body.open').length;
  document.getElementById('prog-bar').style.width = (open/10*100) + '%';
  document.getElementById('prog-label').textContent = open + ' de 10 secciones abiertas';
}

let allOpen = false;
document.getElementById('expand-btn').addEventListener('click', () => {
  allOpen = !allOpen;
  document.querySelectorAll('.sec-body').forEach(b => b.classList.toggle('open', allOpen));
  document.querySelectorAll('.chevron').forEach(c => c.classList.toggle('open', allOpen));
  document.getElementById('expand-btn').textContent = allOpen ? 'Colapsar todas las secciones' : 'Expandir todas las secciones';
  updateProg();
});

function collectData() {
  const d = {};
  document.querySelectorAll('textarea, input[type="text"][id]').forEach(el => { if(el.id && el.id !== 'user-input' && el.id !== 'mes-input') d[el.id] = el.value; });
  d['mes'] = document.getElementById('mes-input').value;
  document.querySelectorAll('input[type="checkbox"]').forEach(cb => { d['cb_'+cb.id] = cb.checked; });
  document.querySelectorAll('.stars').forEach(sel => {
    const wi = sel.id.replace('st','');
    d['stars_'+wi] = sel.querySelectorAll('.star.filled').length;
  });
  return d;
}

async function saveData() {
  if (!currentUser) return;
  const data = collectData();
  try { await window.storage.set(userKey('data'), JSON.stringify(data)); } catch(e) {}
}

async function loadData() {
  if (!currentUser) return;
  try {
    const r = await window.storage.get(userKey('data'));
    if (!r) return;
    const d = JSON.parse(r.value);
    if (d.mes) document.getElementById('mes-input').value = d.mes;
    Object.keys(d).forEach(k => {
      if (k === 'mes') return;
      if (k.startsWith('cb_')) {
        const cb = document.getElementById(k.replace('cb_',''));
        if (cb) cb.checked = d[k];
      } else if (k.startsWith('stars_')) {
        const wi = k.replace('stars_',''), val = d[k];
        document.querySelectorAll(`.star[data-w="${wi}"]`).forEach((s,i) => s.classList.toggle('filled', i < val));
      } else {
        const el = document.getElementById(k);
        if (el && (el.tagName === 'TEXTAREA' || el.type === 'text')) el.value = d[k]||'';
      }
    });
  } catch(e) {}
}

function attachListeners() {
  document.querySelectorAll('textarea, input[type="text"][id], input[type="checkbox"]').forEach(el => {
    if (el.id === 'user-input' || el.id === 'mes-input') return;
    el.addEventListener('input', saveData);
    el.addEventListener('change', saveData);
  });
  document.getElementById('mes-input').addEventListener('input', saveData);

  document.querySelectorAll('.stars').forEach(sel => {
    sel.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', () => {
        const wi = star.dataset.w, val = parseInt(star.dataset.v);
        document.querySelectorAll(`.star[data-w="${wi}"]`).forEach((s,i) => s.classList.toggle('filled', i < val));
        saveData();
      });
    });
  });
}

function enterApp(name) {
  currentUser = name.trim().toLowerCase().replace(/\s+/g,'_');
  document.getElementById('user-tag').textContent = 'Bienvenida, ' + name.trim() + ' — tu progreso es privado';
  document.getElementById('user-tag').style.display = 'block';
  document.getElementById('main-content').style.display = 'block';
  loadData().then(() => attachListeners());
}

document.getElementById('user-btn').addEventListener('click', () => {
  const name = document.getElementById('user-input').value.trim();
  if (!name) return;
  enterApp(name);
});

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const name = e.target.value.trim(); if(name) enterApp(name); }
});

document.getElementById('main-save').addEventListener('click', async () => {
  await saveData();
  const s = document.getElementById('save-status');
  s.textContent = '✓ Guardado — solo tú puedes verlo';
  setTimeout(() => s.textContent = '', 3000);
});

const container = document.getElementById('sections-container');
SECTIONS.forEach(s => container.appendChild(buildSection(s)));
</script>
