<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación de Mentalidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bur:#1d1d1f;--bur-d:#000000;--bur-l:#3a3a3c;--bur-p:#f5f5f7;
  --ear-l:#86868b;--ear-p:#f5f5f7;
  --cream:#ffffff;--white:#FFFFFF;
  --td:#1d1d1f;--tm:#3a3a3c;--ts:#86868b;
  --brd:#d2d2d7;
}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',sans-serif;
  background:#ffffff;
  min-height:100vh;
  color:var(--td);
  line-height:1.6;
  font-size:16px;
}
.header{
  background:#ffffff;
  padding:40px 48px 32px;
  border-bottom:1px solid var(--brd);
  text-align:center;
}
.header-logo{
  max-width:220px;
  width:100%;
  margin:0 auto 20px;
  display:block;
}
.program-badge{
  font-family:'Montserrat',sans-serif;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--ts);
  font-weight:500;
  display:block;
  margin-bottom:10px;
}
.header h1{
  font-family:'Montserrat',sans-serif;
  font-size:1.15rem;
  margin-bottom:0.75rem;
  font-weight:400;
  line-height:1.3;
  color:var(--td);
  letter-spacing:0.5px;
}
.header p{
  font-size:15px;
  line-height:1.75;
  font-weight:300;
  max-width:520px;
  margin:0 auto;
  color:var(--ts);
}
.divider{width:32px;height:1px;background:var(--brd);margin:1rem auto;opacity:1;}
.progress-wrap{
  background:#ffffff;
  padding:16px 48px 20px;
  border-bottom:1px solid var(--brd);
  display:flex;
  align-items:center;
  gap:6px;
}
.prog-track{flex:1;height:2px;background:#e8e8ed;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:#1d1d1f;border-radius:2px;transition:width 0.4s ease;width:0%;}
.prog-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#86868b;font-weight:500;min-width:64px;text-align:right;}
.content{max-width:680px;margin:0 auto;padding:2.5rem 1.5rem 1rem;}
.screen{display:none}
.screen.active{display:block;animation:fadeUp 0.45s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-meta{font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ts);font-weight:500;margin-bottom:14px;}
.q-text{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:400;color:var(--td);line-height:1.65;margin-bottom:1.75rem;}
.options{display:flex;flex-direction:column;gap:10px}
.option{
  padding:14px 16px;
  background:var(--white);
  border:1.5px solid var(--brd);
  border-radius:12px;
  cursor:pointer;
  transition:border-color 0.15s,background 0.15s;
  display:flex;
  align-items:flex-start;
  gap:12px;
  font-size:16px;
  color:var(--tm);
  line-height:1.5;
  text-align:left;
  width:100%;
  font-family:'Montserrat',sans-serif;
}
.option:hover{border-color:var(--ear-l);background:var(--ear-p);}
.option.selected{border-color:#1d1d1f;background:#f5f5f7;color:#1d1d1f;}
.option input[type="radio"]{display:none}
.opt-dot{
  width:18px;height:18px;min-width:18px;
  border-radius:50%;
  border:1.5px solid var(--brd);
  margin-top:1px;
  transition:all 0.15s;
  background:var(--cream);
  display:flex;align-items:center;justify-content:center;
}
.option.selected .opt-dot{background:#1d1d1f;border-color:#1d1d1f;}
.option.selected .opt-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:white;}
.opt-text{flex:1}
/* Group selection cards */
.group-cards{display:flex;flex-direction:column;gap:10px}
.group-card{
  padding:14px 16px;
  background:var(--white);
  border:1.5px solid var(--brd);
  border-radius:12px;
  cursor:pointer;
  transition:border-color 0.15s,background 0.15s;
  display:flex;
  align-items:flex-start;
  gap:12px;
  text-align:left;
  width:100%;
  font-family:'Montserrat',sans-serif;
}
.group-card:hover{border-color:var(--ear-l);background:var(--ear-p);}
.group-card.selected{border-color:#1d1d1f;background:#f5f5f7;}
.gc-dot{
  width:18px;height:18px;min-width:18px;
  border-radius:50%;
  border:1.5px solid var(--brd);
  margin-top:2px;
  transition:all 0.15s;
  background:var(--cream);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.group-card.selected .gc-dot{background:#1d1d1f;border-color:#1d1d1f;}
.group-card.selected .gc-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:white;}
.gc-body{flex:1}
.gc-name{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:500;color:var(--td);margin-bottom:4px;}
.group-thoughts{list-style:none;margin-top:4px;}
.group-thoughts li{font-size:13.5px;color:var(--ts);padding:1px 0;line-height:1.4;}
.group-thoughts li::before{content:'· ';color:var(--ear-l);}
.group-card.selected .gc-name{color:#1d1d1f;}
.group-card.selected .group-thoughts li{color:#3a3a3c;}

/* Group selection cards */
.nav{max-width:680px;margin:0 auto;padding:1.25rem 1.5rem 3rem;display:flex;gap:10px;}
.btn-main{flex:1;padding:15px;background:#1d1d1f;color:white;border:none;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:background 0.2s;min-height:50px;}
.btn-main:hover{background:#3a3a3c}
.btn-main:disabled{opacity:0.35;cursor:not-allowed}
.btn-back{padding:15px 20px;background:transparent;color:var(--tm);border:1.5px solid var(--brd);border-radius:12px;font-family:'Montserrat',sans-serif;font-size:14px;cursor:pointer;transition:border-color 0.15s,background 0.15s;min-height:50px;}
.btn-back:hover{border-color:var(--ear-l);background:var(--ear-p);}
/* Results */
.result-badge{display:inline-block;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--tm);font-weight:500;background:#f5f5f7;border:1px solid var(--brd);border-radius:20px;padding:5px 14px;margin-bottom:1.25rem;}
.result-title{font-family:'Montserrat',sans-serif;color:var(--td);font-size:1.6rem;margin-bottom:0.75rem;font-weight:300;line-height:1.2;letter-spacing:-0.3px;}
.divider-sm{width:36px;height:1px;background:var(--ear-l);margin:1.25rem 0;}
.result-desc{font-size:14.5px;line-height:1.8;color:var(--tm);margin-bottom:1.5rem;}
.result-desc p{margin-bottom:1rem}
.recs-card{background:var(--white);border:1px solid var(--brd);border-radius:14px;padding:1.5rem 1.25rem;margin:1.5rem 0;}
.recs-card h4{font-family:'Montserrat',sans-serif;color:var(--td);font-size:0.95rem;font-weight:600;margin-bottom:1rem;letter-spacing:0.5px;}
.recs-card ul{list-style:none}
.recs-card li{padding:10px 0 10px 20px;position:relative;font-size:14px;line-height:1.7;color:var(--tm);border-bottom:1px solid var(--brd);}
.recs-card li:last-child{border-bottom:none;padding-bottom:0}
.recs-card li::before{content:'→';position:absolute;left:0;color:var(--ts);font-weight:500;font-size:12px;top:12px;}
.recs-card li strong{color:var(--td);font-weight:500;}
.verse-box{background:#f5f5f7;border-left:3px solid var(--brd);border-radius:0 10px 10px 0;padding:1rem 1.25rem;margin:1.5rem 0;}
.verse-box p{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--td);line-height:1.65;margin-bottom:4px;}
.verse-box span{font-size:11px;color:var(--ts);letter-spacing:1px;font-weight:500;text-transform:uppercase;}
.btn-restart{display:block;width:100%;padding:15px;background:transparent;color:var(--td);border:1.5px solid var(--brd);border-radius:12px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:1.5rem;transition:all 0.2s;min-height:50px;letter-spacing:.5px;}
.btn-restart:hover{background:#f5f5f7}
@media(max-width:600px){
  .header{padding:28px 20px 24px}
  .header h1{font-size:1.9rem}
  .progress-wrap{padding:16px 20px 20px}
  .content{padding:2rem 1rem 0.75rem}
  .nav{padding:1rem 1rem 2.5rem;flex-wrap:wrap;}
  .btn-main{order:1}
  .btn-back{order:2;width:100%;}
}
</style>
</head>

      {t:'Sé fiel en lo que ya sabes mientras esperas lo que no sabes',d:'Si mientras "esperas dirección" en algo grande, también has dejado de avanzar en cosas pequeñas que ya sabías que debías hacer, eso no es discernimiento: es parálisis con vocabulario espiritual.'},
      {t:'Haz el ejercicio de la honestidad radical',d:'Siéntate sola, en silencio, y responde por escrito: ¿Qué es lo peor que podría pasar si obedezco? ¿Qué es lo que realmente temo? ¿Si el miedo no existiera, qué haría? La "espera espiritual" muchas veces tiene un nombre más concreto: miedo específico a algo específico.'},
      {t:'Muévete en lo que ya sabes y observa cómo Dios responde',d:'La obediencia abre la revelación. En el reino, la luz generalmente alcanza solo hasta el próximo paso: no te da el mapa completo, te da el paso siguiente. Da ese paso y la próxima luz aparecerá.'}
    ]
  }
];

var grupoSel = null;
var preguntaActual = 0;
var respuestas = {};

// Render grupos
(function(){
  var h = '<div class="group-cards">';
  grupos.forEach(function(g){
    h += '<div class="group-card" data-id="' + g.id + '">';
    h += '<div class="gc-dot"></div>';
    h += '<div class="gc-body">';
    h += '<div class="gc-name">' + g.emoji + ' ' + g.name + '</div>';
    h += '<ul class="group-thoughts">';
    g.thoughts.forEach(function(t){ h += '<li>' + t + '</li>'; });
    h += '</ul></div></div>';
  });
  h += '</div>';
  document.getElementById('groupsContainer').innerHTML = h;

  document.getElementById('groupsContainer').addEventListener('click', function(e){
    var card = e.target.closest('.group-card');
    if(!card) return;
    document.querySelectorAll('.group-card').forEach(function(c){ c.classList.remove('selected'); });
    card.classList.add('selected');
    var id = card.getAttribute('data-id');
    grupoSel = grupos.find(function(g){ return g.id === id; });
    document.getElementById('btnGrupoNext').disabled = false;
  });
})();

function iniciarEval(){
  if(!grupoSel) return;
  respuestas = {};
  preguntaActual = 0;
  document.getElementById('s-grupo').classList.remove('active');
  document.getElementById('s-preguntas').classList.add('active');
  renderPregunta();
}

function renderPregunta(){
  var total = grupoSel.preguntas.length;
  var q = grupoSel.preguntas[preguntaActual];
  var pct = Math.round(((preguntaActual+1)/total)*100);
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progLabel').textContent = (preguntaActual+1)+' de '+total;

  var h = '<div class="q-meta">'+grupoSel.emoji+' '+grupoSel.name+' &mdash; Pregunta '+(preguntaActual+1)+' de '+total+'</div>';
  h += '<div class="q-text">'+q.q+'</div>';
  h += '<div class="options" id="optsActuales">';
  q.opts.forEach(function(opt, i){
    var sel = respuestas[preguntaActual] === i ? ' selected' : '';
    h += '<button class="option'+sel+'" onclick="elegirRespuesta(this,'+i+')">';
    h += '<div class="opt-dot"></div><span class="opt-text">'+opt+'</span>';
    h += '</button>';
  });
  h += '</div>';
  document.getElementById('preguntaContent').innerHTML = h;

  var isUltima = preguntaActual === total-1;
  var tieneResp = respuestas.hasOwnProperty(preguntaActual);

  document.getElementById('btnAnterior').style.display = preguntaActual > 0 ? 'block' : 'none';
  document.getElementById('btnSiguiente').style.display = isUltima ? 'none' : 'block';
  document.getElementById('btnResultado').style.display = isUltima ? 'block' : 'none';
  document.getElementById('btnSiguiente').disabled = !tieneResp;
  document.getElementById('btnResultado').disabled = !tieneResp;

  window.scrollTo({top:0, behavior:'smooth'});
}

function elegirRespuesta(el, i){
  document.querySelectorAll('#optsActuales .option').forEach(function(o){ o.classList.remove('selected'); });
  el.classList.add('selected');
  respuestas[preguntaActual] = i;
  document.getElementById('btnSiguiente').disabled = false;
  document.getElementById('btnResultado').disabled = false;
}

function siguientePregunta(){
  if(!respuestas.hasOwnProperty(preguntaActual)){ alert('Por favor selecciona una respuesta antes de continuar'); return; }
  preguntaActual++;
  renderPregunta();
}

function anteriorPregunta(){
  preguntaActual--;
  renderPregunta();
}

function verResultado(){
  document.getElementById('s-preguntas').classList.remove('active');
  document.getElementById('progress-wrap') && (document.getElementById('progress-wrap').style.display='none');
  document.querySelector('.progress-wrap').style.display = 'none';
  document.getElementById('s-resultado').classList.add('active');

  var g = grupoSel;
  var liHtml = g.pasos.map(function(p){
    return '<li><strong>'+p.t+'.</strong> '+p.d+'</li>';
  }).join('');

  document.getElementById('resultadoContent').innerHTML =
    '<div class="result-badge">'+g.emoji+' '+g.name+'</div>' +
    '<div class="result-title">La raíz de este patrón</div>' +
    '<div class="divider-sm"></div>' +
    '<div class="result-desc"><p>'+g.raiz+'</p></div>' +
    '<div class="recs-card"><h4>Pasos para interrumpir este ciclo</h4><ul>'+liHtml+'</ul></div>' +
    '<div class="verse-box"><p>'+g.verso+'</p><span>— '+g.ref+'</span></div>' +
    '<button class="btn-restart" onclick="location.reload()">Hacer la evaluación nuevamente</button>';

  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Completado';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
