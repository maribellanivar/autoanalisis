<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoanálisis: Soltar el Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: #520101; min-height: 100vh; color: #1d1d1f; line-height: 1.6; }
        .container { max-width: 100%; background: #520101; overflow: hidden; }
        .header { background: #520101; padding: 50px 60px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; width: 100%; }
        .header-logo { max-width: 280px; width: 100%; display: block; height: auto; }
        .header h2 { color: white; font-size: 3.4em; font-weight: 700; line-height: 1.2; max-width: 700px; text-align: center; margin-top: 28px; margin-bottom: 16px; letter-spacing: -1px; }
        .header p { font-size: 1.05em; line-height: 1.7; font-weight: 400; max-width: 700px; color: rgba(255,255,255,0.85); text-align: center; }
        .progress-bar { background: #520101; padding: 16px 60px; display: flex; justify-content: center; align-items: center; gap: 3px; }
        .progress-dot { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.65em; font-weight: 600; color: white; transition: all 0.25s ease; }
        .progress-dot.active { background: #6d0000; border-color: #6d0000; transform: scale(1.08); }
        .progress-dot.completed { background: #6d0000; border-color: #6d0000; }
        .content { padding: 60px 60px; max-width: 900px; margin: 0 auto; background: #520101; }
        .question { display: none; }
        .question.active { display: block; animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question h3 { color: white; margin-bottom: 32px; font-size: 1.35em; line-height: 1.6; font-weight: 600; letter-spacing: -0.4px; }
        .question-number { display: inline-block; background: #6d0000; color: white; width: 32px; height: 32px; border-radius: 50%; text-align: center; line-height: 32px; margin-right: 14px; font-weight: 600; font-size: 0.9em; }
        .options { display: flex; flex-direction: column; gap: 16px; }
        .option { padding: 18px 20px; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 12px; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; font-weight: 400; font-size: 0.98em; color: white; }
        .option:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
        .option.selected { background: #6d0000; border-color: #6d0000; font-weight: 500; }
        .option input[type="radio"] { margin-right: 14px; width: 18px; height: 18px; cursor: pointer; accent-color: white; flex-shrink: 0; }
        .navigation { display: flex; justify-content: center; gap: 16px; padding: 8px 60px 50px; max-width: 900px; margin: 0 auto; background: #520101; }
        .btn { padding: 14px 32px; background: white; color: #6d0000; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 500; transition: all 0.25s ease; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .btn:hover { background: rgba(255,255,255,0.9); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .result { display: none; padding: 60px 60px; max-width: 900px; margin: 0 auto; background: #520101; }
        .result.active { display: block; animation: fadeIn 0.6s ease-in; }
        .result-title { color: white; font-size: 2.8em; margin-bottom: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1.2; }
        .result-description { line-height: 1.8; margin-bottom: 40px; font-size: 1.05em; color: rgba(255,255,255,0.95); }
        .result-description p { margin-bottom: 20px; }
        .result-recommendations { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 12px; margin-top: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .result-recommendations h4 { color: white; margin-bottom: 28px; font-size: 1.35em; font-weight: 600; letter-spacing: -0.3px; }
        .result-recommendations ul { list-style: none; padding: 0; }
        .result-recommendations li { padding: 16px 0 16px 32px; position: relative; line-height: 1.8; color: rgba(255,255,255,0.95); font-size: 0.98em; }
        .result-recommendations li:before { content: "→"; position: absolute; left: 0; color: white; font-weight: 700; font-size: 1.1em; }
        .final-message { margin-top: 40px; padding: 32px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); border-left: 3px solid rgba(255,255,255,0.3); }
        .final-message p { font-size: 1.05em; line-height: 1.8; color: rgba(255,255,255,0.95); margin-bottom: 20px; }
        .final-message p:last-child { font-style: italic; color: rgba(255,255,255,0.75); margin-bottom: 0; }
        .restart-btn { margin-top: 40px; background: white; color: #6d0000; border: 1.5px solid white; display: inline-block; }
        .restart-btn:hover { background: rgba(255,255,255,0.9); }
        @media (max-width: 768px) { .header { padding: 40px 30px; } .header-logo { max-width: 220px; } .header h2 { font-size: 1.8em; } .content { padding: 40px 30px; } .navigation { flex-direction: column; padding: 20px 30px 40px; gap: 12px; } .btn { width: 100%; } .result { padding: 40px 30px; } .progress-bar { padding: 16px 30px; flex-wrap: wrap; } }
    </style>
</head>

<script>
    const questions = [
        { q: "Cuando tus planes no salen como esperabas, ¿cuál es tu primera reacción?", options: [ { text: "Entro en pánico y trato de forzar que las cosas funcionen a toda costa", value: 1 }, { text: "Me frustro intensamente y cuestiono por qué Dios lo permitió", value: 2 }, { text: "Me decepciono pero intento ajustar y buscar una solución rápidamente", value: 3 }, { text: "Respiro, oro y busco entender qué está enseñándome Dios en esta redirección", value: 4 } ] },
        { q: "¿Cómo te sientes cuando tienes que esperar por algo que deseas profundamente?", options: [ { text: "Desesperada e impaciente - busco formas de acelerar el proceso por mi cuenta", value: 1 }, { text: "Ansiosa y constantemente preocupada de que nunca sucederá", value: 2 }, { text: "Inquieta pero intento mantenerme ocupada para distraerme", value: 3 }, { text: "En paz, confiando que Dios tiene el tiempo perfecto aunque no lo entienda", value: 4 } ] },
        { q: "¿Con qué frecuencia intentas manipular o controlar situaciones para lograr 'tu' resultado?", options: [ { text: "Constantemente - tengo un plan para todo y necesito que se cumpla", value: 1 }, { text: "Frecuentemente - me cuesta confiar y prefiero tener todo bajo mi control", value: 2 }, { text: "Ocasionalmente - en áreas donde siento mucho miedo o inseguridad", value: 3 }, { text: "Rara vez - he aprendido que el control es una ilusión y confío en Dios", value: 4 } ] },
        { q: "Cuando oras por algo específico, ¿cómo terminas tus oraciones?", options: [ { text: "Le digo exactamente a Dios cómo debe responder y en qué tiempo", value: 1 }, { text: "Oro por lo que quiero pero con mucha ansiedad de que no suceda", value: 2 }, { text: "Presento mi petición pero todavía me aferro mentalmente al resultado que deseo", value: 3 }, { text: "Presento mi petición y genuinamente digo 'pero que se haga Tu voluntad, no la mía'", value: 4 } ] },
        { q: "¿Cómo reaccionas cuando alguien tiene una idea diferente a la tuya sobre cómo hacer algo?", options: [ { text: "Me molesto y defiendo mi forma porque 'sé' que es la mejor", value: 1 }, { text: "Me pongo a la defensiva pero cedo con resentimiento", value: 2 }, { text: "Escucho pero intento convencer sutilmente de que mi forma es mejor", value: 3 }, { text: "Escucho con apertura y considero que quizás Dios habla a través de otros", value: 4 } ] },
        { q: "En las áreas importantes de tu vida (relaciones, finanzas, carrera), ¿quién tiene realmente la última palabra?", options: [ { text: "Yo - planifico todo y Dios solo debe bendecir mis planes", value: 1 }, { text: "Yo principalmente, pero oro para que Dios me ayude a lograr lo que quiero", value: 2 }, { text: "Es una mezcla - a veces consulto a Dios, a veces decido sola", value: 3 }, { text: "Dios - busco Su dirección primero y ajusto mis planes según Su guía", value: 4 } ] },
        { q: "¿Cómo manejas la incertidumbre sobre el futuro?", options: [ { text: "Con terror - hago listas exhaustivas y planes de contingencia para todo", value: 1 }, { text: "Con mucha ansiedad - paso noches sin dormir pensando en 'qué pasaría si...'", value: 2 }, { text: "Con nerviosismo pero trato de recordarme que debo confiar en Dios", value: 3 }, { text: "Con confianza tranquila - sé que Dios ya está en mi futuro", value: 4 } ] },
        { q: "Cuando tienes que dejar ir algo o alguien que amas, ¿qué haces?", options: [ { text: "No lo suelto - me aferro desesperadamente aunque Dios me pida dejarlo ir", value: 1 }, { text: "Lo suelto externamente pero internamente sigo obsesionada con recuperarlo", value: 2 }, { text: "Lucho entre soltar y aferrarme - es un proceso doloroso y lento", value: 3 }, { text: "Aunque duela, abro mis manos y confío que Dios tiene algo mejor", value: 4 } ] },
        { q: "¿Cómo te sientes cuando las cosas están fuera de tu control?", options: [ { text: "Completamente descontrolada - mi paz depende de controlar mi entorno", value: 1 }, { text: "Muy ansiosa y vulnerable - necesito saber y controlar para sentirme segura", value: 2 }, { text: "Incómoda pero reconozco que el control es limitado", value: 3 }, { text: "En paz - mi seguridad está en Dios, no en controlar las circunstancias", value: 4 } ] },
        { q: "¿Qué tan seguido dices 'No entiendo por qué esto está pasando, pero confío en Ti, Dios' y REALMENTE lo sientes?", options: [ { text: "Nunca - siempre necesito entender para poder confiar", value: 1 }, { text: "Rara vez - lo digo pero no lo siento genuinamente", value: 2 }, { text: "A veces - depende de la situación y cuánto me afecta", value: 3 }, { text: "Frecuentemente - he aprendido que no necesito entender para confiar", value: 4 } ] }
    ];

    let currentQuestion = 0;
    let answers = {};

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        questions.forEach((question, index) => {
            const div = document.createElement('div');
            div.className = 'question' + (index === 0 ? ' active' : '');
            div.id = 'question-' + index;
            let opts = '<div class="options">';
            question.options.forEach(opt => {
                opts += `<label class="option" onclick="selectOption(${index}, ${opt.value}, this)"><input type="radio" name="q${index}" value="${opt.value}"><span>${opt.text}</span></label>`;
            });
            opts += '</div>';
            div.innerHTML = `<h3><span class="question-number">${index + 1}</span>${question.q}</h3>${opts}`;
            container.appendChild(div);
        });
        updateProgress();
    }

    function selectOption(qIndex, value, el) {
        answers[qIndex] = value;
        el.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('nextBtn').disabled = false;
        if (currentQuestion === questions.length - 1) document.getElementById('submitBtn').disabled = false;
    }

    function nextQuestion() {
        if (!answers.hasOwnProperty(currentQuestion)) { alert('Por favor selecciona una respuesta antes de continuar'); return; }
        document.getElementById('question-' + currentQuestion).classList.remove('active');
        currentQuestion++;
        document.getElementById('question-' + currentQuestion).classList.add('active');
        updateButtons(); updateProgress();
    }

    function previousQuestion() {
        document.getElementById('question-' + currentQuestion).classList.remove('active');
        currentQuestion--;
        document.getElementById('question-' + currentQuestion).classList.add('active');
        updateButtons(); updateProgress();
    }

    function updateButtons() {
        document.getElementById('prevBtn').style.display = currentQuestion > 0 ? 'block' : 'none';
        if (currentQuestion === questions.length - 1) {
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('submitBtn').disabled = !answers.hasOwnProperty(currentQuestion);
        } else {
            document.getElementById('nextBtn').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').disabled = !answers.hasOwnProperty(currentQuestion);
        }
    }

    function updateProgress() {
        document.querySelectorAll('.progress-dot').forEach((dot, i) => {
            dot.classList.remove('active', 'completed');
            if (i === currentQuestion) dot.classList.add('active');
            else if (i < currentQuestion) dot.classList.add('completed');
        });
    }

    function calculateResult() {
        if (Object.keys(answers).length !== questions.length) { alert('Por favor responde todas las preguntas'); return; }
        const total = Object.values(answers).reduce((s, v) => s + v, 0);
        const pct = (total / (questions.length * 4)) * 100;
        let title, desc, recs;
        if (pct <= 40) {
            title = "Nivel: Control Total — Puños Cerrados";
            desc = `<p><strong>Mujer,</strong> este autoanálisis revela que estás operando en control total. Tus manos están fuertemente cerradas alrededor de tus planes, sueños y circunstancias. Has construido tu vida sobre la ilusión de que puedes y debes controlar todo para sentirte segura.</p><p><strong>Tu realidad actual:</strong> El control se ha convertido en tu mecanismo de defensa contra el miedo y la incertidumbre. Cuando las cosas no salen según tus planes, entras en crisis. Tu paz está directamente ligada a tu capacidad de controlar tu entorno, lo cual te mantiene en un estado constante de ansiedad porque la realidad es que muy poco está realmente bajo tu control.</p><p><strong>La verdad liberadora:</strong> El control es una ilusión que te está robando la paz, la libertad y los planes perfectos de Dios para ti. Mientras sigas aferrada a tus propios planes, no podrás recibir lo que Dios tiene preparado.</p>`;
            recs = `<li>Identifica las áreas específicas donde estás tratando de controlar - escríbelas y entrégalas conscientemente a Dios cada día</li><li>Practica decir "Dios, confío en Ti con esto" cada vez que sientas la urgencia de controlar</li><li>Comienza un ayuno de planificación excesiva - da espacio a que Dios dirija sin tu agenda rígida</li><li>Lee historias bíblicas de personas que soltaron el control (Abraham, María, José)</li><li>Cuando algo no salga según tu plan, antes de reaccionar, detente y pregunta "Dios, ¿qué estás haciendo aquí?"</li><li>Practica la rendición diaria: cada mañana, abre tus manos físicamente y suelta tus planes a Dios</li><li>Busca consejería o mentoría para trabajar el miedo subyacente que alimenta tu necesidad de control</li>`;
        } else if (pct <= 60) {
            title = "Nivel: Control Compartido — Manos Semi-Abiertas";
            desc = `<p><strong>Mujer,</strong> estás en un punto intermedio. Conoces intelectualmente que debes soltar el control a Dios, pero tu corazón todavía lucha con confiar plenamente. Alternas entre momentos de rendición genuina y momentos de tomar el control de vuelta.</p><p><strong>Tu realidad actual:</strong> Oras pidiendo la voluntad de Dios, pero internamente ya tienes el resultado que esperas. Dices que confías, pero tus acciones revelan ansiedad y necesidad de controlar. Estás en una batalla constante entre tu voluntad y la de Dios, lo cual te mantiene en tensión espiritual y emocional.</p><p><strong>El siguiente paso:</strong> Necesitas pasar de conocer sobre la rendición a vivirla consistentemente. La diferencia entre donde estás y donde Dios quiere llevarte está en soltar completamente, no a medias.</p>`;
            recs = `<li>Identifica tus "pero..." - esas áreas donde dices "confío en Dios, PERO..." y trabájalas específicamente</li><li>Cada vez que ores por algo, termina con "no se haga mi voluntad sino la Tuya" y medita en esas palabras</li><li>Lleva un diario de rendición: escribe qué estás soltando cada día y cómo te sientes</li><li>Cuando tengas que esperar, en lugar de buscar distracciones, siéntate con Dios en la espera</li><li>Practica la obediencia inmediata - cuando Dios te pida algo, hazlo sin negociar</li><li>Rodéate de personas que vivan en rendición genuina y aprende de ellas</li><li>Memoriza Proverbios 3:5-6 y decláralo cuando sientas la tentación de controlar</li><li>Establece "zonas de no control" - áreas donde conscientemente decides no intervenir y dejar actuar a Dios</li>`;
        } else if (pct <= 80) {
            title = "Nivel: Confianza Creciente — Manos Abiertas";
            desc = `<p><strong>Mujer,</strong> has avanzado significativamente en soltar el control a Dios. La mayoría del tiempo, confías en Sus planes más que en los tuyos. Has experimentado suficiente fidelidad de Dios como para saber que Él es confiable, aunque todavía hay momentos donde la tentación de controlar resurge.</p><p><strong>Tu realidad actual:</strong> Vives con mayor paz porque has aprendido que no necesitas controlar para estar segura. Cuando las cosas no salen según tus planes, tu primera reacción es buscar a Dios en lugar de entrar en pánico. Sin embargo, en ciertas áreas vulnerables o bajo presión extrema, todavía luchas con soltar completamente.</p><p><strong>Tu próximo nivel:</strong> Consolidar tu confianza en Dios hasta el punto donde tu paz no se vea afectada por las circunstancias incontrolables. Convertirte en un testimonio vivo de rendición para otras mujeres.</p>`;
            recs = `<li>Identifica tus "puntos de control de emergencia" - esas áreas donde vuelves al control bajo estrés</li><li>Profundiza tu intimidad con Dios - el control resurge cuando nos alejamos de Su presencia</li><li>Comparte tu testimonio de cómo has aprendido a soltar el control para animar a otras</li><li>Cuando enfrentes incertidumbre, en lugar de planificar, pregunta "Dios, ¿qué quieres que haga?"</li><li>Practica la acción de gracias anticipada - agradece a Dios por lo que hará aunque no lo veas aún</li><li>Establece recordatorios diarios de los momentos donde Dios demostró ser fiel cuando soltaste</li><li>Busca oportunidades de soltar cosas más grandes - propiedades, relaciones, sueños - para crecer en fe</li><li>Mentorea a una mujer que esté luchando con el control</li>`;
        } else {
            title = "Nivel: Rendición Total — Manos Completamente Abiertas";
            desc = `<p><strong>Mujer,</strong> has alcanzado un nivel hermoso de rendición. Vives con las manos abiertas ante Dios, confiando plenamente en Sus planes por encima de los tuyos. Has experimentado la libertad profunda que viene de no necesitar controlar.</p><p><strong>Tu realidad actual:</strong> Tu paz no depende de tus circunstancias porque está arraigada en la soberanía de Dios. Cuando los planes cambian, no te desmoronas sino que buscas ver qué está haciendo Dios. Has aprendido que Sus caminos son más altos que los tuyos, y genuinamente deseas Su voluntad más que la tuya.</p><p><strong>Tu llamado ahora:</strong> Ser un faro de rendición para otras mujeres. Tu testimonio de vida en manos abiertas es poderoso y necesario para aquellas que todavía luchan con soltar el control.</p>`;
            recs = `<li>Mantén tu rendición fresca - nunca des por sentado este lugar de gracia</li><li>Comparte públicamente tu jornada de aprender a soltar el control</li><li>Desarrolla un ministerio o mentoría enfocado en ayudar a mujeres a soltar y confiar</li><li>Escribe tu testimonio - cómo pasaste del control a la rendición</li><li>Intercede por mujeres que están paralizadas por la necesidad de control</li><li>Busca niveles más profundos de rendición - siempre hay más que Dios quiere enseñarte</li><li>Sé modelo de paz en medio de la incertidumbre para tu familia y comunidad</li><li>Crea recursos (devocionales, estudios, enseñanzas) sobre la rendición</li>`;
        }
        document.getElementById('questionsContainer').style.display = 'none';
        document.querySelector('.navigation').style.display = 'none';
        document.querySelector('.progress-bar').style.display = 'none';
        const rc = document.getElementById('resultContainer');
        rc.innerHTML = `<div><div class="result-title">${title}</div><div class="result-description">${desc}</div><div class="result-recommendations"><h4>Pasos Para Soltar el Control y Confiar en Dios:</h4><ul>${recs}</ul></div><div class="final-message"><p><strong>Recuerda:</strong> Soltar el control no es resignación, es confianza activa. No es dejar de actuar, es actuar desde un lugar de rendición a Dios en lugar de desde el miedo. Las manos abiertas pueden recibir lo que las manos cerradas nunca podrán: los planes perfectos de Dios para tu vida.</p><p>"Confía en el Señor con todo tu corazón, y no te apoyes en tu propio entendimiento. Reconócelo en todos tus caminos, y Él enderezará tus sendas." — Proverbios 3:5-6</p></div><button class="btn restart-btn" onclick="location.reload()">Realizar Autoanálisis Nuevamente</button></div>`;
        rc.classList.add('active');
    }

    initQuiz();
</script>
