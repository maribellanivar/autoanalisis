<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoanálisis de Decisiones Alineadas al Plan de Dios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #520101;
            min-height: 100vh;
            padding: 0;
            color: #1d1d1f;
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            margin: 0;
            background: #ffffff;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
        }

        .header {
            background: #520101;
            color: white;
            padding: 60px 60px;
            border-bottom: 1px solid #520101;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .program-badge {
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8d735e;
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.1;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        .header p {
            font-size: 1.05em;
            line-height: 1.7;
            font-weight: 400;
            max-width: 700px;
            color: white;
            margin-bottom: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        .header .subtitle {
            font-size: 0.9em;
            margin-top: 18px;
            color: white;
            font-weight: 500;
            letter-spacing: 0.5px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }

        .content {
            padding: 60px 60px;
            max-width: 900px;
            margin: 0 auto;
            background: #520101;
        }

        .question {
            margin-bottom: -35px;
            padding: 0;
            display: none;
        }

        .question.active {
            display: block;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question h3 {
            color: white;
            margin-bottom: 32px;
            font-size: 1.35em;
            line-height: 1.6;
            font-weight: 600;
            letter-spacing: -0.4px;
        }

        .question-number {
            display: inline-block;
            background: #6d0000;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            margin-right: 14px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .pillar-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option {
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            font-weight: 400;
            font-size: 0.98em;
            color: white;
        }

        .option:hover {
            border-color: #6d0000;
            background: rgba(109, 0, 0, 0.1);
        }

        .option.selected {
            background: #6d0000;
            color: white;
            border-color: #6d0000;
            font-weight: 500;
        }

        .option input[type="radio"] {
            margin-right: 14px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6d0000;
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 8px 60px;
            max-width: 900px;
            margin: 0 auto;
            background: #520101;
        }

        .btn {
            padding: 14px 32px;
            background: white;
            color: #6d0000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.25s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            letter-spacing: -0.2px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: none;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .progress-bar {
            height: auto;
            background: #520101;
            margin: 0;
            padding: 16px 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            max-width: 100%;
        }

        .progress-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            font-weight: 600;
            color: white;
            transition: all 0.25s ease;
        }

        .progress-dot.active {
            background: #6d0000;
            border-color: #6d0000;
            color: white;
            transform: scale(1.08);
        }

        .progress-dot.completed {
            background: #6d0000;
            border-color: #6d0000;
            color: white;
        }

        .result {
            display: none;
            padding: 60px 60px;
            max-width: 900px;
            margin: 0 auto;
            background: #520101;
        }

        .result.active {
            display: block;
            animation: fadeIn 0.6s ease-in;
        }

        .result-card {
            background: transparent;
            border-radius: 0;
            padding: 0;
            margin-top: 0;
        }

        .result-title {
            color: white;
            font-size: 2.8em;
            margin-bottom: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .result-description {
            line-height: 1.8;
            margin-bottom: 40px;
            font-size: 1.05em;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.95);
        }

        .result-description p {
            margin-bottom: 20px;
        }

        .pillars-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 50px 0;
        }

        .pillar-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 28px;
            border-radius: 12px;
            border-left: 3px solid #2a0000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid #2a0000;
        }

        .pillar-card h4 {
            color: white;
            margin-bottom: 14px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .pillar-card p {
            font-size: 0.95em;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.85);
        }

        .result-recommendations {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            margin-top: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-recommendations h4 {
            color: white;
            margin-bottom: 28px;
            font-size: 1.35em;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .result-recommendations ul {
            list-style: none;
            padding: 0;
        }

        .result-recommendations li {
            padding: 16px 0;
            padding-left: 32px;
            position: relative;
            line-height: 1.8;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.98em;
        }

        .result-recommendations li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: white;
            font-weight: 700;
            font-size: 1.1em;
        }

        .restart-btn {
            margin-top: 40px;
            background: white;
            color: #6d0000;
            border: 1.5px solid white;
        }

        .restart-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #6d0000;
        }

        .final-message {
            margin-top: 40px;
            padding: 32px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #2a0000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid #2a0000;
        }

        .final-message p {
            font-size: 1.05em;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 20px;
        }

        .final-message p:last-child {
            font-style: italic;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .header {
                padding: 50px 30px;
            }

            .header h1 {
                font-size: 2.5em;
            }

            .header-top {
                flex-direction: column;
                gap: 20px;
            }
            
            .content {
                padding: 40px 30px;
            }

            .navigation {
                flex-direction: column;
                padding: 30px;
                gap: 12px;
            }

            .btn {
                width: 100%;
            }

            .result {
                padding: 40px 30px;
            }

            .result-card {
                padding: 0;
            }

            .pillars-summary {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2.2em;
            }

            .result-title {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div>
                    <div class="program-badge">La Mujer Que Nací Para Ser</div>
                </div>
            </div>
            <h1>Decisiones Alineadas al Plan de Dios</h1>
            <p>Descubre dónde te encuentras en tu jornada hacia la discreción y el discernimiento divino</p>
            <div class="subtitle">6 Pilares de Transformación: Silencio • Identidad • Congruencia • Consejo Sabio • Obediencia • Discernimiento</div>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-dot active" data-question="0">1</div>
            <div class="progress-dot" data-question="1">2</div>
            <div class="progress-dot" data-question="2">3</div>
            <div class="progress-dot" data-question="3">4</div>
            <div class="progress-dot" data-question="4">5</div>
            <div class="progress-dot" data-question="5">6</div>
            <div class="progress-dot" data-question="6">7</div>
            <div class="progress-dot" data-question="7">8</div>
            <div class="progress-dot" data-question="8">9</div>
            <div class="progress-dot" data-question="9">10</div>
            <div class="progress-dot" data-question="10">11</div>
            <div class="progress-dot" data-question="11">12</div>
        </div>

        <div class="content" id="questionsContainer">
            <!-- Questions will be generated here -->
        </div>

        <div class="navigation">
            <button class="btn" id="nextBtn" onclick="nextQuestion()">Siguiente</button>
            <button class="btn" id="submitBtn" onclick="calculateResult()" style="display: none;">Ver Resultado</button>
            <button class="btn" id="prevBtn" onclick="previousQuestion()" style="display: none;">Anterior</button>
        </div>

        <div class="result" id="resultContainer">
            <!-- Result will be shown here -->
        </div>
    </div>

    <script>
        const questions = [
            {
                pilar: "Silencio y Separación",
                q: "¿Cuál es tu relación actual con el silencio en tu vida?",
                options: [
                    { text: "Evito el silencio - necesito estar constantemente rodeada de ruido, voces y opiniones", value: 1 },
                    { text: "Reconozco que las voces externas me contaminan, pero me cuesta trabajo establecer límites", value: 2 },
                    { text: "Tengo espacios de silencio pero aún lucho por protegerlos de intrusiones", value: 3 },
                    { text: "He establecido espacios sagrados de silencio donde solo escucho la voz de Dios", value: 4 }
                ]
            },
            {
                pilar: "Silencio y Separación",
                q: "¿Qué tan consciente eres de cómo las opiniones ajenas contaminan tus decisiones?",
                options: [
                    { text: "Tomo decisiones basadas primariamente en lo que otros piensan o esperan de mí", value: 1 },
                    { text: "Las opiniones de otros me afectan más de lo que me gustaría admitir", value: 2 },
                    { text: "Intento filtrar opiniones pero algunas aún nublan mi discernimiento", value: 3 },
                    { text: "Sé de qué voces debo separar y protejo mi mente de opiniones contaminantes", value: 4 }
                ]
            },
            {
                pilar: "Identidad de Propósito",
                q: "¿Cuál es la base de tu identidad actual?",
                options: [
                    { text: "Mi identidad está construida sobre mis heridas, fracasos y lo que otros dicen de mí", value: 1 },
                    { text: "Lucho entre mi identidad herida y lo que sé que Dios dice, pero la herida gana frecuentemente", value: 2 },
                    { text: "He comenzado a construir una identidad de propósito pero aún hay influencias de mis heridas", value: 3 },
                    { text: "Mi identidad está fundamentada en mi propósito divino y las heridas ya no definen mi decisiones", value: 4 }
                ]
            },
            {
                pilar: "Identidad de Propósito",
                q: "¿Cuán conectada estás con el propósito específico que Dios tiene para tu vida?",
                options: [
                    { text: "No tengo claridad sobre mi propósito - voy día a día sin dirección", value: 1 },
                    { text: "Tengo una idea vaga de mi propósito pero no tengo certeza de cómo vivirlo", value: 2 },
                    { text: "Conozco mi propósito pero a menudo me desvío por distracciones o dudas", value: 3 },
                    { text: "Tengo absoluta claridad de mi propósito y mis decisiones fluyen naturalmente de él", value: 4 }
                ]
            },
            {
                pilar: "Señales de Congruencia",
                q: "¿Cómo evalúas si algo (decisión, hábito, persona) te acerca o te aleja del plan de Dios?",
                options: [
                    { text: "No tengo un proceso - tomo decisiones por impulso, emoción o presión", value: 1 },
                    { text: "Intento evaluar pero mis criterios son inconsistentes y confusos", value: 2 },
                    { text: "Tengo algunos marcadores pero aún necesito desarrollar un discernimiento más fino", value: 3 },
                    { text: "Reconozco claramente las señales de congruencia que me acercan al plan de Dios", value: 4 }
                ]
            },
            {
                pilar: "Señales de Congruencia",
                q: "¿Detectas cuándo una relación, trabajo o decisión disminuye tu paz y te aleja de Dios?",
                options: [
                    { text: "No - ignoro las señales de alerta y sigo adelante de todas formas", value: 1 },
                    { text: "A veces veo señales pero las minimizo o espero que cambien solos", value: 2 },
                    { text: "Reconozco las señales pero me cuesta trabajo actuar en base a ellas", value: 3 },
                    { text: "Veo claramente las señales y tomo acción inmediatamente para protegerme", value: 4 }
                ]
            },
            {
                pilar: "Consejo Sabio",
                q: "¿Cuál es tu criterio para elegir a quién pedir consejo?",
                options: [
                    { text: "Pido consejo a quien está disponible, sin considerar su fruto o sabiduría", value: 1 },
                    { text: "A veces considero el fruto de la persona, pero frecuentemente busco validación rápida", value: 2 },
                    { text: "Intento buscar personas con fruto, pero todavía me influencian voces sin sabiduría", value: 3 },
                    { text: "Busco deliberadamente consejo solo de personas cuyo fruto demuestra su sabiduría", value: 4 }
                ]
            },
            {
                pilar: "Consejo Sabio",
                q: "¿Qué tan dispuesta estás a seguir un consejo que va contra lo que quieres escuchar?",
                options: [
                    { text: "No sigo consejos que no se alineen con lo que deseo - busco validación de mi opinión", value: 1 },
                    { text: "Escucho pero defiendo mi posición si me incomoda lo que me dicen", value: 2 },
                    { text: "Intento estar abierta pero aún lucho cuando el consejo me desafía", value: 3 },
                    { text: "Recibo consejo sabio con humildad aunque me cuestione mi juicio anterior", value: 4 }
                ]
            },
            {
                pilar: "Obediencia y Acción",
                q: "¿Cuál es tu respuesta típica cuando Dios te muestra claramente lo que quiere que hagas?",
                options: [
                    { text: "Vuelvo atrás a la indecisión paralizada por el miedo al 'y qué si...'", value: 1 },
                    { text: "Demoro la decisión esperando más confirmación o una situación perfecta", value: 2 },
                    { text: "Comienzo a obedecer pero frecuentemente cuestiono y retrocedo", value: 3 },
                    { text: "Reconozco Su voz y obedezco aunque tenga miedo - tomo acción inmediata", value: 4 }
                ]
            },
            {
                pilar: "Obediencia y Acción",
                q: "¿Cómo manejas el valle de la indecisión?",
                options: [
                    { text: "Permanezco atrapada - paralizada entre opciones, sin avanzar", value: 1 },
                    { text: "Busco escapar del valle pero sin asumir responsabilidad real de mis decisiones", value: 2 },
                    { text: "Intento salir del valle pero frecuentemente recaigo en la indecisión", value: 3 },
                    { text: "Salgo del valle del piso mediante obediencia decisiva en lo que Dios me muestra", value: 4 }
                ]
            },
            {
                pilar: "Discernimiento",
                q: "¿Cuán afinado está tu discernimiento para distinguir entre la voz de Dios, la tuya y del enemigo?",
                options: [
                    { text: "No distingo entre voces - todas suenan igual y me creo en caos", value: 1 },
                    { text: "A veces logro identificar la voz de Dios, pero frecuentemente me confundo", value: 2 },
                    { text: "Tengo mayor claridad pero en momentos de estrés o presión aún pierdo discernimiento", value: 3 },
                    { text: "Distingo claramente entre voces y navego decisiones con seguridad espiritual", value: 4 }
                ]
            },
            {
                pilar: "Discernimiento",
                q: "¿Cuán vigilante eres sobre los patrones de tus decisiones y sus resultados?",
                options: [
                    { text: "No reflexiono sobre mis decisiones - simplemente sigo adelante sin aprender", value: 1 },
                    { text: "Ocasionalmente noto patrones pero no realizo cambios reales", value: 2 },
                    { text: "Soy consciente de mis patrones y estoy haciendo cambios gradualmente", value: 3 },
                    { text: "Mantengo vigilancia constante de mis decisiones y ajusto mi rumbo continuamente", value: 4 }
                ]
            }
        ];

        let currentQuestion = 0;
        let answers = {};

        function initQuiz() {
            const container = document.getElementById('questionsContainer');
            questions.forEach((question, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = `question ${index === 0 ? 'active' : ''}`;
                questionDiv.id = `question-${index}`;
                
                let optionsHTML = '<div class="options">';
                question.options.forEach((option, optIndex) => {
                    optionsHTML += `
                        <label class="option" onclick="selectOption(${index}, ${option.value}, this)">
                            <input type="radio" name="q${index}" value="${option.value}">
                            <span>${option.text}</span>
                        </label>
                    `;
                });
                optionsHTML += '</div>';
                
                questionDiv.innerHTML = `
                    <h3><span class="question-number">${index + 1}</span>${question.q}<span class="pillar-tag">${question.pilar}</span></h3>
                    ${optionsHTML}
                `;
                
                container.appendChild(questionDiv);
            });
            updateProgress();
        }

        function selectOption(questionIndex, value, element) {
            answers[questionIndex] = value;
            
            const options = element.parentElement.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            
            document.getElementById('nextBtn').disabled = false;
            if (currentQuestion === questions.length - 1) {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function nextQuestion() {
            if (!answers.hasOwnProperty(currentQuestion)) {
                alert('Por favor selecciona una respuesta antes de continuar');
                return;
            }
            
            document.getElementById(`question-${currentQuestion}`).classList.remove('active');
            currentQuestion++;
            document.getElementById(`question-${currentQuestion}`).classList.add('active');
            
            updateButtons();
            updateProgress();
        }

        function previousQuestion() {
            document.getElementById(`question-${currentQuestion}`).classList.remove('active');
            currentQuestion--;
            document.getElementById(`question-${currentQuestion}`).classList.add('active');
            
            updateButtons();
            updateProgress();
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');
            
            prevBtn.style.display = currentQuestion > 0 ? 'block' : 'none';
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'block';
                submitBtn.disabled = !answers.hasOwnProperty(currentQuestion);
            } else {
                nextBtn.style.display = 'block';
                submitBtn.style.display = 'none';
                nextBtn.disabled = !answers.hasOwnProperty(currentQuestion);
            }
        }

        function updateProgress() {
            // Update progress dots
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                dot.classList.remove('active', 'completed');
                if (index === currentQuestion) {
                    dot.classList.add('active');
                } else if (index < currentQuestion) {
                    dot.classList.add('completed');
                }
            });
        }

        function calculateResult() {
            if (Object.keys(answers).length !== questions.length) {
                alert('Por favor responde todas las preguntas');
                return;
            }
            
            const totalScore = Object.values(answers).reduce((sum, val) => sum + val, 0);
            const maxScore = questions.length * 4;
            const percentage = (totalScore / maxScore) * 100;
            
            let resultTitle, resultDescription, pillarsHTML, recommendations;
            
            if (percentage <= 40) {
                resultTitle = "Nivel: En el Desierto - Necesitas Transformación Urgente";
                resultDescription = `<p><strong>Mujer,</strong> tu autoanálisis revela que aún no has comenzado el verdadero camino hacia decisiones alineadas con el plan de Dios. Los 6 pilares de transformación están muy débiles o ausentes, dejándote vulnerable a las voces contaminantes, a tu identidad herida y a la parálisis de la indecisión.</p>
                <p><strong>Tu realidad actual:</strong> Tus decisiones siguen siendo gobernadas por el miedo, las opiniones ajenas, la falta de propósito claro y la indecisión paralítica. No has establecido límites de silencio, tu identidad sigue siendo herida, no tienes criterios de congruencia y buscas validación en voces sin fruto.</p>
                <p><strong>Lo que necesitas urgentemente:</strong> Una transformación radical y deliberada de cómo tomas decisiones. Esto comienza con crear espacios de silencio, redefinir tu identidad desde tu propósito divino, y aprender a escuchar SOLO la voz de Dios en medio del ruido.</p>`;
                
                pillarsHTML = `
                    <div class="pillars-summary">
