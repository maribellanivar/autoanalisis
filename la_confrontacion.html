<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Confrontación — Punto De Quiebre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --black:#1d1d1f;--dark:#3a3a3c;--mid:#6e6e73;--soft:#86868b;
  --brd:#d2d2d7;--light:#e8e8ed;--bg:#f5f5f7;--white:#ffffff;
}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',sans-serif;
  background:var(--white);
  min-height:100vh;
  color:var(--black);
  line-height:1.6;
  font-size:16px;
}

/* HEADER */
.header{
  background:var(--white);
  padding:36px 48px 28px;
  border-bottom:1px solid var(--brd);
  text-align:center;
}
.header-logo{max-width:200px;width:100%;margin:0 auto 16px;display:block;}
.header-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--soft);font-weight:500;margin-bottom:10px;}
.header h1{font-family:'Montserrat',sans-serif;font-size:clamp(1.5rem, 5vw, 2.5rem);font-weight:300;color:var(--black);letter-spacing:2px;margin-bottom:6px;line-height:1.15;}
.header-divider{width:28px;height:1px;background:var(--brd);margin:14px auto;}
.header p{font-size:14px;line-height:1.75;font-weight:300;max-width:480px;margin:0 auto;color:var(--soft);}

/* PROGRESS */
.progress-wrap{
  background:var(--white);padding:14px 48px 18px;
  border-bottom:1px solid var(--brd);
  display:flex;align-items:center;gap:8px;
}
.prog-track{flex:1;height:2px;background:var(--light);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--black);border-radius:2px;transition:width 0.4s ease;width:0%;}
.prog-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--soft);font-weight:500;min-width:56px;text-align:right;}

/* SCREENS */
.screen{display:none}.screen.active{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CONTENT */
.content{max-width:640px;margin:0 auto;padding:2.5rem 1.5rem 1rem;}
.q-meta{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--soft);font-weight:500;margin-bottom:12px;}
.q-text{font-family:'Montserrat',sans-serif;font-size:1.1rem;font-weight:400;color:var(--black);line-height:1.65;margin-bottom:1.75rem;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:10px}
.option{
  padding:15px 18px;background:var(--white);
  border:1.5px solid var(--brd);border-radius:10px;
  cursor:pointer;transition:border-color 0.15s,background 0.15s;
  display:flex;align-items:flex-start;gap:12px;
  font-size:15px;color:var(--dark);
  line-height:1.5;text-align:left;width:100%;
  font-family:'Montserrat',sans-serif;font-weight:300;
}
.option:hover{border-color:var(--dark);background:var(--bg);}
.option.selected{border-color:var(--black);background:var(--bg);color:var(--black);font-weight:400;}
.opt-dot{
  width:18px;height:18px;min-width:18px;border-radius:50%;
  border:1.5px solid var(--brd);margin-top:1px;
  transition:all 0.15s;background:var(--white);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.option.selected .opt-dot{background:var(--black);border-color:var(--black);}
.option.selected .opt-dot::after{content:'';width:6px;height:6px;border-radius:50%;background:white;}

/* NAV */
.nav{max-width:640px;margin:0 auto;padding:1.25rem 1.5rem 3rem;display:flex;gap:10px;}
.btn-main{flex:1;padding:15px;background:var(--black);color:white;border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.2s;min-height:50px;letter-spacing:.3px;}
.btn-main:hover{background:var(--dark)}
.btn-main:disabled{opacity:0.25;cursor:not-allowed}
.btn-back{padding:15px 20px;background:transparent;color:var(--dark);border:1.5px solid var(--brd);border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;cursor:pointer;transition:border-color 0.15s,background 0.15s;min-height:50px;}
.btn-back:hover{border-color:var(--dark);background:var(--bg);}

/* RESULT */
.res-tag{display:inline-block;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--soft);font-weight:500;background:var(--bg);border:1px solid var(--brd);border-radius:20px;padding:5px 14px;margin-bottom:1.25rem;}
.res-title{font-family:'Montserrat',sans-serif;color:var(--black);font-size:1.7rem;margin-bottom:0.5rem;font-weight:300;line-height:1.25;letter-spacing:-0.3px;}
.res-divider{width:28px;height:1px;background:var(--brd);margin:1.25rem 0;}
.res-intro{font-size:15px;line-height:1.85;color:var(--dark);margin-bottom:1.5rem;font-weight:300;}
.res-intro strong{color:var(--black);font-weight:500;}
.humanidad-card{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:1.5rem 1.25rem;margin:1.5rem 0;}
.humanidad-card h4{font-family:'Montserrat',sans-serif;color:var(--black);font-size:0.85rem;font-weight:600;margin-bottom:1rem;letter-spacing:1.5px;text-transform:uppercase;}
.humanidad-card ul{list-style:none}
.humanidad-card li{padding:11px 0 11px 22px;position:relative;font-size:14px;line-height:1.75;color:var(--dark);border-bottom:1px solid var(--brd);font-weight:300;}
.humanidad-card li:last-child{border-bottom:none;padding-bottom:0}
.humanidad-card li::before{content:'→';position:absolute;left:0;color:var(--soft);font-size:12px;top:13px;}
.humanidad-card li strong{color:var(--black);font-weight:500;display:block;margin-bottom:2px;}
.verse-card{background:var(--white);border:1px solid var(--brd);border-radius:12px;padding:1.25rem;margin:1.5rem 0;}
.verse-card p{font-family:'Montserrat',sans-serif;font-size:0.95rem;font-style:italic;color:var(--dark);line-height:1.7;margin-bottom:6px;font-weight:300;}
.verse-card span{font-size:10px;color:var(--soft);letter-spacing:2px;text-transform:uppercase;font-weight:500;}
.cierre-card{background:var(--bg);border:1px solid var(--brd);border-radius:12px;padding:1.25rem;margin:1.5rem 0;}
.cierre-card p{font-size:14px;line-height:1.85;color:var(--dark);margin-bottom:0.75rem;font-weight:300;}
.cierre-card p:last-child{margin-bottom:0;font-style:italic;color:var(--soft);}
.btn-restart{display:block;width:100%;padding:15px;background:transparent;color:var(--black);border:1.5px solid var(--brd);border-radius:10px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:400;cursor:pointer;margin-top:1.5rem;transition:all 0.2s;min-height:50px;}
.btn-restart:hover{background:var(--bg)}

@media(max-width:600px){
  .header{padding:28px 20px 22px}
  .progress-wrap{padding:12px 20px 16px}
  .content{padding:2rem 1rem 0.75rem}
  .nav{padding:1rem 1rem 2.5rem;flex-wrap:wrap;}
  .btn-main{order:1}.btn-back{order:2;width:100%;}
  .res-title{font-size:1.35rem}
}
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//Z" alt="Punto De Quiebre">
  <div class="header-divider"></div>
  <div class="header-sub">Mentoría · Actividad de Confrontación</div>
  <h1>La Confrontación</h1>
  <p>No el enemigo, no la economía, no los demás. Hoy te enfrentas al único obstáculo que nadie más puede remover: tú misma.</p>
</div>

<div class="progress-wrap">
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-label" id="progLabel">1 de 10</div>
</div>

<div class="screen active" id="s-preguntas">
  <div class="content" id="preguntaContent"></div>
  <div class="nav">
    <button class="btn-back" id="btnAnterior" onclick="anteriorPregunta()" style="display:none">← Anterior</button>
    <button class="btn-main" id="btnSiguiente" disabled onclick="siguientePregunta()">Siguiente →</button>
    <button class="btn-main" id="btnResultado" disabled onclick="verResultado()" style="display:none">Ver mi confrontación →</button>
  </div>
</div>

<div class="screen" id="s-resultado">
  <div class="content" id="resultadoContent"></div>
</div>

<script>
var preguntas = [
  {
    categoria: "Autoconocimiento",
    q: "Cuando algo en tu vida no avanza, ¿cuál es tu respuesta más honesta y automática?",
    opts: [
      "Busco razones externas: la economía, las personas, el tiempo",
      "Sé que algo en mí lo está bloqueando, pero evito mirarlo de frente",
      "Me paralizo sin analizar, simplemente espero a que cambie",
      "Me siento a examinar qué parte de mí está contribuyendo al estancamiento"
    ]
  },
  {
    categoria: "Control y rendición",
    q: "¿Hay algo que Dios te ha pedido que sueltes —una actitud, una relación, un control— y que sigues cargando porque soltarlo te da miedo?",
    opts: [
      "No, creo que he rendido todo lo que Él me ha pedido",
      "Hay algo, pero no estoy segura de que sea eso lo que Él me pide",
      "Sé exactamente qué es, y sé que aún no lo he soltado",
      "Hay varias cosas y evito pensar en ellas porque incomodan demasiado"
    ]
  },
  {
    categoria: "Control y rendición",
    q: "Cuando Dios te muestra una dirección que no esperabas o que contradice tus planes, ¿qué hace tu humanidad?",
    opts: [
      "Obedece aunque duela, la rendición es algo que practico activamente",
      "Negocia: busca cómo hacer la voluntad de Dios pero a mi manera",
      "Se resiste: busca señales adicionales hasta que la dirección encaja con lo que yo quería",
      "Se paraliza: no avanza ni en Su dirección ni en la mía"
    ]
  },
  {
    categoria: "Autopercepción",
    q: "¿Cuánto de lo que crees de ti misma hoy fue puesto por Dios, y cuánto fue instalado por experiencias de dolor, fracaso o lo que otros dijeron de ti?",
    opts: [
      "La mayor parte viene de Dios, tengo una identidad bastante arraigada en Su verdad",
      "Es mixto: algunas áreas están saludables, otras todavía las gobiernan heridas del pasado",
      "Honestamente, la mayor parte de lo que creo de mí viene de lo que viví y lo que me dijeron",
      "No lo había pensado así, pero al reflexionar, me doy cuenta de que el dolor ha tenido más voz que Dios"
    ]
  },
  {
    categoria: "Humanidad como obstáculo",
    q: "¿Cuál de estos rasgos de tu humanidad reconoces que más frecuentemente te ha bloqueado a ti misma?",
    opts: [
      "El miedo: a fallar, a exponerme, a decepcionar, a lo desconocido",
      "El orgullo: preferir no intentar a intentar y que me vean fracasar",
      "La comodidad: elegir lo conocido aunque lo conocido me tenga estancada",
      "La desconfianza: en Dios, en el proceso, en mí misma o en los demás"
    ]
  },
  {
    categoria: "Humanidad como obstáculo",
    q: "¿Cuántas veces en el último año has sabido exactamente lo que debías hacer y elegiste no hacerlo? ¿Qué te detuvo?",
    opts: [
      "Pocas veces, generalmente actúo cuando sé lo que debo hacer",
      "Varias veces: el miedo a las consecuencias o al juicio de otros me detuvo",
      "Muchas veces: una incomodidad que no sé nombrar bien me paraliza",
      "Constantemente: hay una brecha enorme entre lo que sé y lo que hago"
    ]
  },
  {
    categoria: "Relaciones y espejos",
    q: "¿Hay una conversación que sabes que necesitas tener, un límite que necesitas poner, o una relación que necesitas evaluar honestamente, y que llevas tiempo evitando?",
    opts: [
      "No, mis relaciones están bastante bien atendidas",
      "Hay algo pendiente pero lo he estado procesando activamente",
      "Sí, lo sé con claridad, y llevo tiempo evitándolo porque es incómodo",
      "Hay varias cosas así y la evasión se ha vuelto mi modo por defecto"
    ]
  },
  {
    categoria: "Fe y acción",
    q: "Si Dios te preguntara hoy: '¿Qué has hecho con lo que ya te di?', ¿cuál sería tu respuesta más honesta?",
    opts: [
      "He sido fiel con lo que tengo, aunque no es perfecto",
      "He usado parte de lo que me dio, pero hay mucho que ha quedado sin activar",
      "Honestamente, he guardado más de lo que he dado: el miedo ha sido más grande que la obediencia",
      "No lo había pensado así, pero esta pregunta me confronta profundamente"
    ]
  },
  {
    categoria: "Estancamiento",
    q: "¿Cuál es la versión de ti misma que Dios te ha mostrado que puedes ser, y de qué manera tu humanidad ha bloqueado que esa versión emerja?",
    opts: [
      "La veo con claridad y estoy activamente trabajando para encarnarla",
      "La veo pero hay una brecha entre esa visión y lo que hago día a día",
      "A veces la vislumbro pero el miedo a no poder lograrlo hace que la evite",
      "He dejado de verla porque las decepciones han nublado esa imagen"
    ]
  },
  {
    categoria: "El siguiente paso",
    q: "Si supieras con certeza que Dios va a sostenerte, que el fracaso no tiene la última palabra y que eres capaz de más de lo que crees, ¿qué harías diferente esta semana?",
    opts: [
      "Poco, vivo bastante alineada con lo que siento que Dios me pide",
      "Daría un paso específico que he estado postergando por miedo",
      "Mi vida entera se vería diferente, hay demasiado que he contenido por inseguridad",
      "Esta pregunta me confronta tanto que necesito tiempo para responderla honestamente"
    ]
  }
];

// Scoring: each question maps answer index to insight weight
// 0 = más saludable, 3 = más área de trabajo
// We collect all answers and generate personalized result

var respuestas = {};
var preguntaActual = 0;

function renderPregunta() {
  var total = preguntas.length;
  var p = preguntas[preguntaActual];
  var pct = Math.round(((preguntaActual + 1) / total) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = (preguntaActual + 1) + ' de ' + total;

  var h = '<div class="q-meta">' + p.categoria + ' — ' + (preguntaActual + 1) + ' de ' + total + '</div>';
  h += '<div class="q-text">' + p.q + '</div>';
  h += '<div class="options" id="optsActuales">';
  p.opts.forEach(function(opt, i) {
    var sel = respuestas[preguntaActual] === i ? ' selected' : '';
    h += '<button class="option' + sel + '" onclick="elegirRespuesta(this,' + i + ')">';
    h += '<div class="opt-dot"></div><span>' + opt + '</span></button>';
  });
  h += '</div>';
  document.getElementById('preguntaContent').innerHTML = h;

  var isUltima = preguntaActual === total - 1;
  var tieneResp = respuestas.hasOwnProperty(preguntaActual);
  document.getElementById('btnAnterior').style.display = preguntaActual > 0 ? 'block' : 'none';
  document.getElementById('btnSiguiente').style.display = isUltima ? 'none' : 'block';
  document.getElementById('btnResultado').style.display = isUltima ? 'block' : 'none';
  document.getElementById('btnSiguiente').disabled = !tieneResp;
  document.getElementById('btnResultado').disabled = !tieneResp;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function elegirRespuesta(el, i) {
  document.querySelectorAll('#optsActuales .option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  respuestas[preguntaActual] = i;
  document.getElementById('btnSiguiente').disabled = false;
  document.getElementById('btnResultado').disabled = false;
}

function siguientePregunta() {
  if (!respuestas.hasOwnProperty(preguntaActual)) { alert('Por favor selecciona una respuesta antes de continuar'); return; }
  preguntaActual++;
  renderPregunta();
}

function anteriorPregunta() {
  preguntaActual--;
  renderPregunta();
}

function verResultado() {
  // Calculate score: sum of answer indices (0-3 per question)
  var total = 0;
  var byCategory = {};
  preguntas.forEach(function(p, i) {
    var ans = respuestas[i] || 0;
    total += ans;
    if (!byCategory[p.categoria]) byCategory[p.categoria] = [];
    byCategory[p.categoria].push(ans);
  });

  var maxScore = preguntas.length * 3;
  var pct = (total / maxScore) * 100;

  // Category averages
  var catAvg = {};
  Object.keys(byCategory).forEach(function(cat) {
    var arr = byCategory[cat];
    catAvg[cat] = arr.reduce(function(a,b){return a+b;}, 0) / arr.length;
  });

  // Find top 2 most challenging categories
  var sorted = Object.keys(catAvg).sort(function(a,b){return catAvg[b]-catAvg[a];});
  var top2 = sorted.slice(0,2);

  // Determine level
  var nivel, intro, confrontacion;

  if (pct <= 30) {
    nivel = 'Zona de claridad';
    intro = '<strong>Hay algo que reconocer aquí:</strong> tienes un nivel notable de autoconocimiento y alineación. Pero no confundas claridad con llegada. El hecho de que puedas ver bien no significa que estés actuando en todo lo que ves. La trampa de las mujeres con tu perfil es que el análisis reemplaza la acción. Sabes mucho. La pregunta no es si ves: es si estás haciendo.';
    confrontacion = 'Tu humanidad no te bloquea con ignorancia, te bloquea con la distancia entre lo que sabes y lo que haces. La zona más peligrosa no es la oscuridad, es la luz en la que no caminas.';
  } else if (pct <= 55) {
    nivel = 'Zona de conciencia sin movimiento';
    intro = '<strong>Ves, pero no te mueves.</strong> Tu mayor reto no es la falta de conocimiento ni la falta de fe declarada: es la brecha que existe entre lo que sabes que Dios te pide y lo que realmente haces. Tienes conciencia, y esa conciencia es un regalo. Pero la conciencia sin acción se convierte en carga. No en victoria.';
    confrontacion = 'Tu humanidad te ha convencido de que estar consciente es suficiente. No lo es. Dios no recompensa la conciencia, recompensa la obediencia. Y la obediencia que no se mueve, no es obediencia.';
  } else if (pct <= 75) {
    nivel = 'Zona de evasión activa';
    intro = '<strong>Sabes que hay algo, y lo estás evitando.</strong> No con malicia, sino con la herramienta más sofisticada de tu humanidad: la racionalización. Le pones nombre espiritual, le pones nombre de prudencia, le pones nombre de proceso. Pero en el fondo, hay algo que Dios ha puesto el dedo sobre eso, y tú has mirado para otro lado.';
    confrontacion = 'Tu humanidad no te bloquea con dudas: te bloquea con justificaciones. Y las justificaciones inteligentes son las más peligrosas porque suenan razonables mientras te mantienen exactamente donde estás.';
  } else {
    nivel = 'Zona de bloqueo profundo';
    intro = '<strong>El obstáculo más grande en tu vida eres tú misma.</strong> No el enemigo. No las circunstancias. No las personas. Tú. Y eso no es una condena: es la mejor noticia posible. Porque si el problema eres tú, la solución también está en ti — en la versión de ti que decide rendirse, moverse, y confiar aunque duela.';
    confrontacion = 'Tu humanidad ha construido un sistema tan eficiente de autoprotección que ya no puedes distinguir entre protegerte y destruirte. Lo que crees que te cuida te está costando tu destino.';
  }

  // Category insights
  var catInsights = {
    'Autoconocimiento': 'No puedes cambiar lo que no ves. Si el autoconocimiento es tu área de trabajo, el primer paso no es actuar diferente, es detenerte a mirarte honestamente, sin filtros y sin justificaciones.',
    'Control y rendición': 'La rendición no es derrota: es el acto más valiente de tu fe. Mientras sigas negociando con Dios sobre sus términos, seguirás viviendo en una versión reducida de Su plan para ti.',
    'Autopercepción': 'Lo que crees de ti determina lo que te permites vivir. Si tu autopercepción fue construida por el dolor más que por la Palabra, estás viviendo dentro de límites que Dios nunca puso.',
    'Humanidad como obstáculo': 'Tu humanidad no es tu enemiga, pero ignorarla sí es tu enemigo. Nombrar lo que te bloquea internamente es el comienzo de dejar de ser tu propio obstáculo.',
    'Relaciones y espejos': 'Tus relaciones son el espejo más honesto de quién eres y qué permites. Lo que toleras, lo que evitas, lo que buscas en otros: todo dice algo de lo que no has resuelto dentro.',
    'Fe y acción': 'La fe sin movimiento no es fe, es comodidad con vocabulario espiritual. Dios se mueve cuando tú te mueves, no antes.',
    'Estancamiento': 'El estancamiento crónico no es una circunstancia, es una decisión que se toma todos los días cuando elegimos lo conocido sobre lo posible.',
    'El siguiente paso': 'La pregunta no es si puedes. La pregunta es si estás dispuesta a descubrir que sí puedes. Esa disposición es la que cambia todo.'
  };

  // Build result HTML
  var topCatHtml = top2.map(function(cat) {
    return '<li><strong>' + cat + '</strong>' + catInsights[cat] + '</li>';
  }).join('');

  // All categories as actions
  var accionesHtml = '';
  sorted.forEach(function(cat) {
    if (catAvg[cat] > 1) {
      accionesHtml += '<li><strong>' + cat + '</strong>' + catInsights[cat] + '</li>';
    }
  });
  if (!accionesHtml) {
    accionesHtml = '<li><strong>Profundización</strong>Tu nivel de alineación es alto. El trabajo ahora es ir a más profundidad, no más amplitud. Busca las áreas donde todavía hay rendición pendiente.</li>';
  }

  document.getElementById('s-preguntas').classList.remove('active');
  document.getElementById('progress-wrap') && (document.querySelector('.progress-wrap').style.display = 'none');
  document.querySelector('.progress-wrap').style.display = 'none';
  document.getElementById('s-resultado').classList.add('active');

  var resHtml =
    '<div class="res-tag">Tu resultado · La Confrontación</div>' +
    '<div class="res-title">' + nivel + '</div>' +
    '<div class="res-divider"></div>' +
    '<div class="res-intro"><p>' + intro + '</p></div>' +
    '<div class="humanidad-card">' +
      '<h4>Lo que tu humanidad te ha estado haciendo</h4>' +
      '<p style="font-size:13px;color:var(--soft);margin-bottom:1rem;font-weight:300;">' + confrontacion + '</p>' +
    '</div>' +
    '<div class="humanidad-card">' +
      '<h4>Tus áreas de mayor trabajo interno</h4>' +
      '<ul>' + accionesHtml + '</ul>' +
    '</div>' +
    '<div class="verse-card">' +
      '<p>"Porque el que quiera salvar su vida, la perderá; pero el que pierda su vida por causa de mí, la hallará."</p>' +
      '<span>— Mateo 16:25</span>' +
    '</div>' +
    '<div class="cierre-card">' +
      '<p>El plan de Dios para ti no está bloqueado por el enemigo, por la economía ni por las personas. Está esperando que la versión más honesta de ti decida rendirse, moverse, y confiar en que Él es suficiente para sostenerte mientras lo haces.</p>' +
      '<p>Hoy no saliste con más información. Saliste con menos excusas.</p>' +
    '</div>' +
    '<button class="btn-restart" onclick="location.reload()">Hacer la confrontación nuevamente</button>';

  document.getElementById('resultadoContent').innerHTML = resHtml;
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('progLabel').textContent = 'Completado';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderPregunta();
</script>
